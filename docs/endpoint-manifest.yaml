  - id: get_attachment_metadata
    area: attachments
    path: /api/attachment/{id}/
    method: GET
    operation_id: attachment_retrieve
    response_schema: '#/components/schemas/Attachment'
  - id: update_attachment_metadata
    area: attachments
    path: /api/attachment/{id}/
    method: PATCH
    operation_id: attachment_partial_update
    request_schema: '#/components/schemas/PatchedAttachment'
    request_content_type: multipart/form-data
    response_schema: '#/components/schemas/Attachment'
  - id: delete_attachment
    area: attachments
    path: /api/attachment/{id}/
    method: DELETE
    operation_id: attachment_destroy
    response_status: 204
  - id: list_part_thumbnails
    area: attachments
    path: /api/part/thumbs/
    method: GET
