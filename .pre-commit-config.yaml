repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-mod-tidy-repo
      - id: go-imports
      - id: golangci-lint-repo-mod
      - id: go-test-mod
        args: [--hook:env:GOFLAGS=-trimpath]
      - id: go-build-repo-mod
